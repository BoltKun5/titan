# This file is a template, and might need editing before it works on your project.
# To contribute improvements to CI/CD templates, please follow the Development guide at:
# https://docs.gitlab.com/ee/development/cicd/templates.html
# This specific template is located at:
# https://gitlab.com/gitlab-org/gitlab/-/blob/master/lib/gitlab/ci/templates/Getting-Started.gitlab-ci.yml

# This is a sample GitLab CI/CD configuration file that should run without any modifications.
# It demonstrates a basic 3 stage CI/CD pipeline. Instead of real tests or scripts,
# it uses echo commands to simulate the pipeline execution.
#
# A pipeline is composed of independent jobs that run scripts, grouped into stages.
# Stages run in sequential order, but jobs within stages run in parallel.
#
# For more information, see: https://docs.gitlab.com/ee/ci/yaml/index.html#stages

image: node:16.14.0

variables:
  RULES_CHANGES_PATH: "**/*"

.base-rules:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: never
    - if: $CI_COMMIT_TAG
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - $RULES_CHANGES_PATH
    - when: manual
      allow_failure: true

stages:
  - cache
  - build
  - test
  - start
  - deploy

default:
  before_script:
    - curl -f https://get.pnpm.io/v6.16.js | node - add --global pnpm@7
    - pnpm config set store-dir .pnpm-store

cache:
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - .pnpm-store
    - node_modules/
    - "packages/**/node_modules/"
    - "apps/**/node_modules/"
    - "**/dist/"

# Apps

.api:
  extends: .base-rules
  variables:
    RULES_CHANGES_PATH: "apps/api/**/*"
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

.core:
  extends: .base-rules
  variables:
    RULES_CHANGES_PATH: "packages/vokit_core/**/*"
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# Steps

caching:
  stage: cache
  script:
    - echo "Installing dependencies..."
    - pnpm install --frozen-lockfile

api-build:
  stage: build
  extends: .api
  needs: ["caching"]
  script:
    - echo "Compiling the api code..."
    - pnpm --filter vokit-api tsc

core-build:
  stage: build
  extends: .core
  needs: ["caching"]
  script:
    - echo "Compiling the core code..."
    - pnpm --filter vokit_core tsc

api-test-lint:
  stage: test
  extends: .api
  needs: ["caching"]
  script:
    - echo "Checking the api lint..."
    - pnpm --filter vokit-api lint:check

core-test-lint:
  stage: test
  extends: .core
  needs: ["caching"]
  script:
    - echo "Checking the core lint..."
    - pnpm --filter vokit_core lint:check

api-start:
  stage: start
  extends: .api
  needs: ["api-build"]
  script:
    - echo "starting the api in ci mode..."
    - pnpm --filter vokit-api start:ci

api-deploy:
  stage: deploy
  extends: .api
  needs: ["api-start"]
  script:
    - echo "Deploying application..."
    - echo "Application successfully deployed."

core-publish:
  stage: deploy
  extends: .core
  needs: ["core-build"]
  script:
    - echo "Deploying new core version..."
